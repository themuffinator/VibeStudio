name: pr-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build-test-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Validate Documentation Version
        run: python scripts/sync_doc_versions.py --check

      - name: Install Meson + Ninja
        run: python -m pip install --upgrade pip meson ninja

      - name: Setup MSVC
        if: matrix.os == 'windows-latest'
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.1"
          arch: ${{ matrix.os == 'windows-latest' && 'win64_msvc2022_64' || matrix.os == 'macos-latest' && 'clang_64' || 'linux_gcc_64' }}

      - name: Configure
        shell: bash
        run: >
          meson setup builddir
          --backend ninja
          --buildtype=debugoptimized
          -Dgithub_repo=${{ github.repository }}
          -Dupdate_channel=dev

      - name: Build
        run: meson compile -C builddir

      - name: Test
        run: meson test -C builddir --print-errorlogs

      - name: Validate CLI Binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: >
          python scripts/validate_build.py
          --binary "builddir/src/vibestudio.exe"
          --expected-version "$((Get-Content VERSION -Raw).Trim())"

      - name: Validate CLI Binary (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: >
          python scripts/validate_build.py
          --binary "builddir/src/vibestudio"
          --expected-version "$(cat VERSION)"
