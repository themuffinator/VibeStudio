name: pr-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build-test-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Validate Documentation Version
        run: python scripts/sync_doc_versions.py --check

      - name: Validate Credits And Compiler Pins
        run: python scripts/validate_credits.py

      - name: Install Meson + Ninja
        run: python -m pip install --upgrade pip meson ninja

      - name: Setup MSVC
        if: matrix.os == 'windows-latest'
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.1"
          arch: ${{ matrix.os == 'windows-latest' && 'win64_msvc2022_64' || matrix.os == 'macos-latest' && 'clang_64' || 'linux_gcc_64' }}

      - name: Validate Translation Extraction
        run: python scripts/extract_translations.py --check --dry-run --require-tool

      - name: Configure
        shell: bash
        run: >
          meson setup builddir
          --backend ninja
          --buildtype=debugoptimized
          -Dgithub_repo=${{ github.repository }}
          -Dupdate_channel=dev

      - name: Build
        run: meson compile -C builddir

      - name: Test
        run: meson test -C builddir --print-errorlogs

      - name: Validate CLI Binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: >
          python scripts/validate_build.py
          --binary "builddir/src/vibestudio.exe"
          --expected-version "$((Get-Content VERSION -Raw).Trim())"

      - name: Validate CLI Binary (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: >
          python scripts/validate_build.py
          --binary "builddir/src/vibestudio"
          --expected-version "$(cat VERSION)"

      - name: Validate CLI Docs (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: >
          python scripts/validate_cli_docs.py
          --binary "builddir/src/vibestudio.exe"

      - name: Validate Credits (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: python scripts/validate_credits.py

      - name: Validate CLI Docs (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: >
          python scripts/validate_cli_docs.py
          --binary "builddir/src/vibestudio"

      - name: Validate Credits (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: python scripts/validate_credits.py

      - name: Validate Sample Projects (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: >
          python scripts/validate_samples.py
          --binary "builddir/src/vibestudio.exe"

      - name: Validate Sample Projects (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: >
          python scripts/validate_samples.py
          --binary "builddir/src/vibestudio"

      - name: Validate Portable Package Skeleton (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: >
          python scripts/validate_packaging.py
          --binary "builddir/src/vibestudio.exe"

      - name: Validate Portable Package Skeleton (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: >
          python scripts/validate_packaging.py
          --binary "builddir/src/vibestudio"

      - name: Validate Release Assets (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: >
          python scripts/validate_release_assets.py
          --binary "builddir/src/vibestudio.exe"

      - name: Validate Release Assets (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: >
          python scripts/validate_release_assets.py
          --binary "builddir/src/vibestudio"

      - name: Stage Portable Artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: >
          python scripts/package_portable.py
          --binary "builddir/src/vibestudio.exe"
          --output "artifacts"
          --archive
          --target-platform current

      - name: Stage Portable Artifact (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: >
          python scripts/package_portable.py
          --binary "builddir/src/vibestudio"
          --output "artifacts"
          --archive
          --target-platform current

      - name: Upload Portable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibestudio-${{ matrix.os }}-${{ github.sha }}
          path: artifacts/**
          if-no-files-found: error
          retention-days: 14
