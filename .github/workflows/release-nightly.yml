name: release-nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 0"

permissions:
  contents: read

concurrency:
  group: release-nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: package-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Meson + Ninja
        run: python -m pip install --upgrade pip meson ninja

      - name: Validate Credits And Compiler Pins
        run: python scripts/validate_credits.py

      - name: Setup MSVC
        if: matrix.os == 'windows-latest'
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.1"
          arch: ${{ matrix.os == 'windows-latest' && 'win64_msvc2022_64' || matrix.os == 'macos-latest' && 'clang_64' || 'linux_gcc_64' }}

      - name: Validate Translation Extraction
        run: python scripts/extract_translations.py --check --dry-run --require-tool

      - name: Configure
        shell: bash
        run: >
          meson setup builddir
          --backend ninja
          --buildtype=release
          -Dgithub_repo=${{ github.repository }}
          -Dupdate_channel=nightly

      - name: Build
        run: meson compile -C builddir

      - name: Test
        run: meson test -C builddir --print-errorlogs

      - name: Validate And Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          python scripts/validate_build.py --binary "builddir/src/vibestudio.exe" --expected-version "$((Get-Content VERSION -Raw).Trim())"
          python scripts/validate_cli_docs.py --binary "builddir/src/vibestudio.exe"
          python scripts/validate_credits.py
          python scripts/extract_translations.py --check --dry-run --require-tool
          python scripts/validate_samples.py --binary "builddir/src/vibestudio.exe"
          python scripts/validate_packaging.py --binary "builddir/src/vibestudio.exe"
          python scripts/validate_release_assets.py --binary "builddir/src/vibestudio.exe"
          python scripts/package_portable.py --binary "builddir/src/vibestudio.exe" --output "nightly-artifacts" --archive --target-platform current

      - name: Validate And Package (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          python scripts/validate_build.py --binary "builddir/src/vibestudio" --expected-version "$(cat VERSION)"
          python scripts/validate_cli_docs.py --binary "builddir/src/vibestudio"
          python scripts/validate_credits.py
          python scripts/extract_translations.py --check --dry-run --require-tool
          python scripts/validate_samples.py --binary "builddir/src/vibestudio"
          python scripts/validate_packaging.py --binary "builddir/src/vibestudio"
          python scripts/validate_release_assets.py --binary "builddir/src/vibestudio"
          python scripts/package_portable.py --binary "builddir/src/vibestudio" --output "nightly-artifacts" --archive --target-platform current

      - name: Upload Nightly Portable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibestudio-nightly-${{ matrix.os }}-${{ github.run_number }}
          path: nightly-artifacts/**
          if-no-files-found: error
          retention-days: 30
